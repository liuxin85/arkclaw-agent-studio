services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: arkclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arkclaw
      POSTGRES_PASSWORD: arkclaw
      POSTGRES_DB: arkclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: arkclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
